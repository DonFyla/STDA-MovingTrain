{% extends "base.html" %}

{% block title %}Password Changed - Moving Train Chess Academy{% endblock %}

{% block content %}
<section class="min-h-[calc(100vh-5rem)] flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="w-full max-w-md">
        <div class="bg-white rounded-2xl shadow-lg p-8 border border-brand-100 text-center">
            <div class="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            </div>
            <h1 class="text-2xl font-bold text-brand-900 mb-4">Password changed</h1>
            <p class="text-brand-600 mb-6">
                Your password has been set. You can now log in with your new password.
            </p>
            <a href="{% url 'accounts:login' %}" class="inline-block px-6 py-3 bg-brand-600 text-white font-semibold rounded-full hover:bg-brand-700 transition-colors">
                Log in
            </a>
        </div>
    </div>
</section>
{% endblock %}
