<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ subject|default:"Moving Train Chess Academy" }}</title>
</head>
<body style="margin: 0; padding: 0; font-family: Arial, sans-serif; background-color: #F5EFE7;">
    <table width="100%" cellpadding="0" cellspacing="0" border="0">
        <tr>
            <td align="center" style="padding: 40px 20px;">
                <table width="600" cellpadding="0" cellspacing="0" border="0" style="max-width: 600px; background-color: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05);">
                    <tr>
                        <td style="background-color: #5E5044; padding: 24px; text-align: center;">
                            <h1 style="color: #ffffff; margin: 0; font-size: 24px;">Moving Train Chess Academy</h1>
                            <p style="color: #E8DDD0; margin: 8px 0 0 0; font-size: 14px;">Nigeria's Leading Online Chess Academy</p>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding: 32px;">
                            {% block content %}{% endblock %}
                        </td>
                    </tr>
                    <tr>
                        <td style="background-color: #F5EFE7; padding: 24px; text-align: center; border-top: 1px solid #E8DDD0;">
                            <p style="color: #5E5044; font-size: 14px; margin: 0;">
                                <strong>Questions?</strong> Reply to this email or contact us via WhatsApp.
                            </p>
                            <p style="color: #8F7057; font-size: 12px; margin: 16px 0 0 0;">
                                &copy; {% now "Y" %} Moving Train Chess Academy<br>
                                <a href="{{ site_url }}" style="color: #5E5044;">{{ site_url }}</a>
                            </p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
